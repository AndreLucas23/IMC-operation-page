<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <noscript>Seu navegador está com o JavaScript desativado. Ative para utilizar a calculadora.</noscript>
    
    <main class="container">
        <header class="main-title">
            <h1>Cálculo de IMC</h1>
        </header>

        <div class="btn-container" id="start-section">
            <button type="button" id="init-btn">Iniciar</button>
        </div>

        <section id="inputs-box" class="forms-box">
            <form id="imc-form">
                <label for="weight">Insira seu peso (kg):</label>
                <input type="number" 
                id="weight" 
                step="0.1" 
                min="0" 
                placeholder="Ex: 75.5" 
                required>

                <label for="height">Insira sua altura (m):</label>
                <input type="number" 
                id="height" 
                step="0.01" 
                min="0" 
                placeholder="Ex: 1.75" 
                required>

                <label for="imc">Seu IMC:</label>
                <input type="text" 
                id="imc" 
                readonly 
                placeholder="0.00">

                <h3 id="imc-zone"></h3>
            </form>
        </section>
    </main>
</body>
</html>
